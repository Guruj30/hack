<!DOCTYPE html>
<html>
<head>
<title>AI Chatbot Assistant</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(to right,#0f4c81,#1e6fd9);
    font-family:Arial;
}

.card{
    background:white;
    width:430px;
    height:420px;
    padding:30px;
    border-radius:15px;
    text-align:center;
    position:relative;
}

.card img{
    width:120px;
}

.buttons{
    margin-top:20px;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:8px;
    font-size:14px;
    cursor:pointer;
}

.online{
    background:#1e9e55;
    color:white;
}

.offline{
    background:#e07a5f;
    color:white;
}

.chat{
    margin-top:15px;
    background:#4c6ef5;
    color:white;
}

/* Description button */

.desc{
    position:absolute;
    top:10px;
    left:10px;
    font-size:12px;
    background:#444;
    color:white;
    padding:6px 10px;
}

/* popup */

.popup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.3);
}

.popup-box{
    background:white;
    padding:15px;
    border-radius:10px;
    width:250px;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

/* Red Close Button */

.closebtn{
    background:red;
    color:white;
    padding:6px 12px;
    border:none;
    border-radius:6px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="card">

<button class="desc" onclick="showPopup()">Disclaimer</button>

<h2>AI Chatbot Assistant</h2>

<img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">

<h3>Select Mode</h3>

<div class="buttons">

<!-- CONNECTED ONLINE FORM -->
<a href="{{ url_for('online') }}">
<button class="online">Online Mode</button>
</a>
<br>
<br>
<!-- CONNECTED OFFLINE FORM -->
<a href="{{ url_for('offline') }}">
<button class="offline">Offline Mode</button>
</a>





</div>

</div>

<!-- popup -->

<div class="popup" id="popup">
<div class="popup-box">

<p>
This AI assistant provides informational guidance only and does not substitute professional medical advice.
</p>

<button class="closebtn" onclick="closePopup()">Close</button>

</div>
</div>

<script>

function showPopup(){
document.getElementById("popup").style.display="block";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
