<!DOCTYPE html>
<html>
<head>
<title>Health Advisory</title>

<style>

body{
margin:0;
height:100vh;
background:yellow;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:Arial;
color:black;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

.symbol{
font-size:120px;
animation:blink 1s infinite;
}

.message{
font-size:38px;
font-weight:bold;
margin-top:20px;
}

.sub{
font-size:20px;
margin-top:15px;
}

</style>

</head>

<body>

<div>

<div class="symbol">⚕</div>

<div class="message">
MILD HEALTH WARNING
</div>

<div class="sub">
the symptoms appear to be mild.<br>
Monitor your health.<br>
If symptoms persist, consult a doctor.
</div>

</div>

</body>
</html>
