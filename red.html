<!DOCTYPE html>
<html>
<head>
<title>Health Risk Alert</title>

<style>

body{
margin:0;
height:100vh;
background:red;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:Arial;
color:white;
}

/* Blinking animation for symbol only */

@keyframes blink{
0%{opacity:1;}
50%{opacity:0;}
100%{opacity:1;}
}

.symbol{
font-size:120px;
animation:blink 1s infinite;
}

.message{
font-size:40px;
font-weight:bold;
margin-top:20px;
}

.sub{
font-size:22px;
margin-top:15px;
}

</style>

</head>

<body>

<div>

<div class="symbol">⚠</div>

<div class="message">
DANGER! HEALTH RISK DETECTED
</div>

<div class="sub">
Your symptoms may be serious.<br>
Please go to the nearest hospital immediately.
</div>

</div>

</body>
</html>
